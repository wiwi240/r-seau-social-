<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f4c81" />
    <title>Hors ligne</title>
    <style>
      :root {
        color: #132238;
        background:
          radial-gradient(circle at top left, rgba(244, 191, 117, 0.2), transparent 28%),
          radial-gradient(circle at top right, rgba(30, 64, 175, 0.14), transparent 32%),
          linear-gradient(180deg, #f6efe6 0%, #eef3f8 42%, #f8fafc 100%);
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }

      main {
        width: min(560px, 100%);
        padding: 1.5rem;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid rgba(19, 34, 56, 0.1);
        box-shadow: 0 20px 60px rgba(28, 44, 66, 0.12);
        backdrop-filter: blur(18px);
      }

      h1,
      p {
        margin-top: 0;
      }

      p:last-child {
        margin-bottom: 0;
        color: #5d6b82;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Connexion indisponible</h1>
      <p>Le mini réseau social ne peut pas charger cette page pour le moment.</p>
      <p>Rouvre l'application dès que la connexion Internet revient.</p>
    </main>
  </body>
  </html>
